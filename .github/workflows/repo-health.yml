# Repo Health
# Lightweight liveness check used for branch-protection status checks.
name: Repo Health

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions: {}

jobs:
  repo-health:
    name: repo-health
    runs-on: ubuntu-latest
    # No checkout, no API calls — keep deny-by-default from the workflow level.
    permissions: {}
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit
      - name: Health check
        run: echo "Repository health check passed"
